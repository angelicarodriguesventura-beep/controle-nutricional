<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Fitness Premium</title>
<style>
body {font-family: Arial,sans-serif;background:#f0f2f5;margin:0;padding:10px;}
.container {max-width:450px;margin:auto;background:white;padding:15px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
h1{text-align:center;color:#222;}
.tabs{display:flex;margin-bottom:10px;}
.tabs button{flex:1;padding:10px;border:none;cursor:pointer;background:#ddd;border-radius:10px 10px 0 0;}
.tabs .active{background:#1e90ff;color:white;}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
button.add{background:#1e90ff;color:white;padding:10px;border-radius:10px;width:100%;border:none;margin-top:5px;cursor:pointer;}
.refeicao{background:#f7f9fc;padding:8px;border-radius:10px;margin-top:10px;}
.item{font-size:13px;margin:3px 0;}
.small{font-size:12px;color:#555;}
.bar-container{background:#ddd;height:12px;border-radius:10px;margin:5px 0;}
.bar-fill{height:12px;border-radius:10px;width:0%;background:#1e90ff;transition: width 0.5s;}
.autocomplete-suggestions{border:1px solid #ccc;background:#fff;position:absolute;z-index:1000;max-height:150px;overflow-y:auto;border-radius:8px;}
.autocomplete-suggestion{padding:5px;cursor:pointer;}
.autocomplete-suggestion:hover{background:#eee;}
canvas{width:100%;max-width:100%;height:150px;margin-top:10px;}
</style>
</head>
<body>
<div class="container">
<h1>App Fitness Premium</h1>
<div class="tabs">
<button id="tabNutri" class="active" onclick="mostrar('nutri')">Nutrição</button>
<button id="tabCorpo" onclick="mostrar('corpo')">Corpo</button>
</div>

<!-- NUTRIÇÃO -->
<div id="nutri">
<h3>Metas Diárias</h3>
<label>Proteína (g)</label>
<input type="number" id="metaProteina" value="120">
<label>Carboidrato (g)</label>
<input type="number" id="metaCarbo" value="150">
<label>Calorias (kcal)</label>
<input type="number" id="metaCalorias" value="1600">
<label>Água (ml)</label>
<input type="number" id="metaAgua" value="2000">

<h3>Adicionar Alimento</h3>
<select id="refeicao">
<option value="cafe">☀ Café da Manhã</option>
<option value="almoco">🍛 Almoço</option>
<option value="lanche">☕ Lanche</option>
<option value="jantar">🌙 Jantar</option>
</select>

<input type="text" id="alimento" placeholder="Alimento (ex: frango)">
<div id="sugestoes" class="autocomplete-suggestions"></div>
<input type="number" id="quantidade" placeholder="Quantidade">
<select id="unidade">
<option value="unidade">Unidade</option>
<option value="g">Gramas (g)</option>
<option value="ml">ML</option>
</select>
<button class="add" onclick="adicionar()">Adicionar</button>

<h3>Totais do Dia</h3>
<div>Proteína: <span id="totalProteina">0</span> g</div>
<div class="bar-container"><div id="barProteina" class="bar-fill"></div></div>
<div>Carboidrato: <span id="totalCarbo">0</span> g</div>
<div class="bar-container"><div id="barCarbo" class="bar-fill"></div></div>
<div>Calorias: <span id="totalCalorias">0</span> kcal</div>
<div class="bar-container"><div id="barCalorias" class="bar-fill"></div></div>
<div>Água: <span id="totalAgua">0</span> ml</div>
<div class="bar-container"><div id="barAgua" class="bar-fill"></div></div>

<div id="lista"></div>
</div>

<!-- CORPO -->
<div id="corpo" style="display:none;">
<h3>Medidas Corporais</h3>
<input type="number" id="peso" placeholder="Peso (kg)">
<input type="number" id="altura" placeholder="Altura (cm)">
<input type="number" id="cintura" placeholder="Cintura (cm)">
<input type="number" id="quadril" placeholder="Quadril (cm)">
<input type="number" id="pescoco" placeholder="Pescoço (cm)">
<button class="add" onclick="salvarCorpo()">Salvar Medidas</button>

<h3>Resultado Atual</h3>
<div id="resultado"></div>

<h3>Histórico Detalhado:</h3>
<div id="historico"></div>

<h3>Evolução do Peso (kg)</h3>
<canvas id="graficoPeso"></canvas>
</div>

</div>

<script>
// Banco completo detalhado
let banco = {
"whey growth":{p:24,c:120,carb:3},
"whey integralmedica":{p:24,c:120,carb:3},
"whey probiotica":{p:24,c:120,carb:3},
"ovo cozido":{p:6,c:70,carb:0},
"ovo frito":{p:7,c:90,carb:0},
"omelete":{p:6,c:90,carb:1},
"frango peito":{p:31,c:165,carb:0},
"frango desfiado":{p:30,c:160,carb:0},
"frango assado":{p:32,c:170,carb:0},
"frango asa":{p:24,c:130,carb:0},
"frango coxa":{p:23,c:125,carb:0},
"bife":{p:26,c:250,carb:0},
"patinho":{p:27,c:220,carb:0},
"carne moida":{p:25,c:240,carb:0},
"filé mignon":{p:26,c:250,carb:0},
"salmão":{p:20,c:208,carb:0},
"sardinha":{p:22,c:208,carb:0},
"batata cozida":{p:2,c:80,carb:18},
"batata doce":{p:2,c:86,carb:20},
"batata frita":{p:3,c:312,carb:40},
"farinha aveia":{p:13,c:389,carb:66},
"farelo aveia":{p:15,c:390,carb:50},
"cacau 70%":{p:20,c:228,carb:14},
"banana":{p:1,c:89,carb:23},
"maçã":{p:0.5,c:52,carb:14},
"mamão":{p:0.6,c:43,carb:11},
"laranja":{p:1,c:47,carb:12},
"abacaxi":{p:0.5,c:50,carb:13},
"morango":{p:0.5,c:33,carb:8},
"manga":{p:0.8,c:60,carb:15},
"kiwi":{p:1,c:61,carb:15},
"brócolis":{p:3,c:34,carb:7},
"abóbora":{p:1,c:25,carb:6},
"espinafre":{p:3,c:23,carb:4},
"tomate":{p:1,c:22,carb:4},
"vagem":{p:2,c:31,carb:7},
"couve":{p:2,c:32,carb:6},
"pão":{p:4,c:70,carb:13},
"pão integral":{p:4,c:65,carb:12},
"biscoito":{p:2,c:50,carb:9},
"queijo prato":{p:7,c:90,carb:1},
"queijo minas":{p:6,c:85,carb:1},
"mussarela":{p:7,c:95,carb:1},
"iogurte natural":{p:10,c:120,carb:8},
"iogurte sabor":{p:10,c:130,carb:10},
"lasanha":{p:12,c:250,carb:30},
"pizza":{p:10,c:280,carb:35},
"suco limão":{p:0,c:10,carb:3},
"suco caju":{p:0,c:45,carb:11}
};

let dados = JSON.parse(localStorage.getItem("nutri")) || {cafe:[],almoco:[],lanche:[],jantar:[]};
let historico = JSON.parse(localStorage.getItem("corpo")) || [];

function mostrar(aba){
document.getElementById("nutri").style.display=aba==="nutri"?"block":"none";
document.getElementById("corpo").style.display=aba==="corpo"?"block":"none";
document.getElementById("tabNutri").classList.toggle("active",aba==="nutri");
document.getElementById("tabCorpo").classList.toggle("active",aba==="corpo");
}

// Autocomplete
let inputAlimento = document.getElementById("alimento");
let sugestoesDiv = document.getElementById("sugestoes");
inputAlimento.addEventListener("input", function(){
  let val = this.value.toLowerCase();
  sugestoesDiv.innerHTML="";
  if(!val) return;
  for(let key in banco){
    if(key.includes(val)){
      let div = document.createElement("div");
      div.classList.add("autocomplete-suggestion");
      div.innerText=key;
      div.addEventListener("click",()=>{inputAlimento.value=key;sugestoesDiv.innerHTML="";});
      sugestoesDiv.appendChild(div);
    }
  }
});

// Adicionar alimento
function adicionar(){
let nome=document.getElementById("alimento").value.toLowerCase();
let qtd=Number(document.getElementById("quantidade").value)||1;
let unidade=document.getElementById("unidade").value;
let ref=document.getElementById("refeicao").value;

if(!banco[nome]){alert("Alimento não cadastrado"); return;}

let base=banco[nome];
let mult=1;
if(unidade==="g"||unidade==="ml"){mult=qtd/100;} else mult=qtd;

let item={nome,p:base.p*mult,c:base.c*mult,carb:base.carb*mult};
dados[ref].push(item);
localStorage.setItem("nutri",JSON.stringify(dados));
atualizar();
}

// Atualizar totais
function atualizar(){
let totalP=0,totalC=0,totalCarb=0,totalAgua=0;
let html="";
for(let r in dados){
if(dados[r].length>0){
html+=`<div class='refeicao'><b>${r.toUpperCase()}</b>`;
dados[r].forEach(i=>{
totalP+=i.p; totalC+=i.c; totalCarb+=i.carb;
html+=`<div class='item'>${i.nome} | P:${i.p.toFixed(1)}g C:${i.carb.toFixed(1)}g Kcal:${i.c.toFixed(1)}</div>`;
});
html+="</div>";
}
}

document.getElementById("lista").innerHTML=html;

let metaP=Number(document.getElementById("metaProteina").value);
let metaC=Number(document.getElementById("metaCalorias").value);
let metaCarb=Number(document.getElementById("metaCarbo").value);
let metaAgua=Number(document.getElementById("metaAgua").value);

document.getElementById("totalProteina").innerText=totalP.toFixed(1);
document.getElementById("totalCarbo").innerText=totalCarb.toFixed(1);
document.getElementById("totalCalorias").innerText=totalC.toFixed(1);
document.getElementById("totalAgua").innerText=totalAgua;

document.getElementById("barProteina").style.width=Math.min(totalP/metaP*100,100)+"%";
document.getElementById("barCalorias").style.width=Math.min(totalC/metaC*100,100)+"%";
document.getElementById("barCarbo").style.width=Math.min(totalCarb/metaCarb*100,100)+"%";
document.getElementById("barAgua").style.width=Math.min(totalAgua/metaAgua*100,100)+"%";
}

// Corpo
function salvarCorpo(){
let peso=Number(document.getElementById("peso").value);
let altura=Number(document.getElementById("altura").value)/100;
let cintura=Number(document.getElementById("cintura").value);
let quadril=Number(document.getElementById("quadril").value);
let pescoco=Number(document.getElementById("pescoco").value);

let imc=peso/(altura*altura);

let gordura=163.205*Math.log10(cintura+quadril-pescoco)-97.684*Math.log10(altura*100)-78.387;
let massaGorda=(peso*gordura/100).toFixed(1);
let massaMagra=(peso-massaGorda).toFixed(1);

let registro={data:new Date().toLocaleDateString(),peso,imc:imc.toFixed(1),gordura:gordura.toFixed(1),massaGorda,massaMagra};
historico.unshift(registro);
localStorage.setItem("corpo",JSON.stringify(historico));
mostrarHistorico();
desenharGrafico();
}

function mostrarHistorico(){
let html="";
historico.forEach(h=>{
html+=`<div class='small'>${h.data} - ${h.peso}kg | IMC: ${h.imc} | Gordura: ${h.gordura}% | Massa Gorda: ${h.massaGorda}kg | Massa Magra: ${h.massaMagra}kg</div>`;
});
document.getElementById("historico").innerHTML=html;
}

// Gráfico simples do peso
function desenharGrafico(){
let c=document.getElementById("graficoPeso");
let ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);
let max=0;
historico.forEach(h=>{if(h.peso>max) max=h.peso;});
let w=c.width/historico.length;
ctx.fillStyle="#1e90ff";
historico.forEach((h,i)=>{
let hgt=(h.peso/max)*c.height;
ctx.fillRect(i*w+5,c.height-hgt,w-10,hgt);
});
}

atualizar();
mostrarHistorico();
desenharGrafico();
</script>
</body>
</html>
