<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Nutricional Premium</title>
<style>
/* --- Geral --- */
body {font-family: 'Arial', sans-serif; background:#f0f2f5; margin:0; padding:0;}
.container {max-width:450px; margin:auto; background:white; border-radius:25px; padding:15px; box-shadow:0 10px 30px rgba(0,0,0,0.2);}
h1{text-align:center; color:#222; margin-bottom:20px;}
.tabs{display:flex; margin-bottom:10px;}
.tabs button{flex:1; padding:12px; border:none; cursor:pointer; background:#ddd; border-radius:15px 15px 0 0; font-weight:bold; transition:0.3s;}
.tabs .active{background:#1e90ff; color:white;}
input,select{width:100%; padding:10px; margin:5px 0; border-radius:10px; border:1px solid #ccc; box-sizing:border-box;}
button.add,button.addAlimento{background:#1e90ff;color:white;padding:12px;border-radius:12px;width:100%;border:none;margin-top:10px;cursor:pointer;font-weight:bold; transition:0.3s;}
button.add:hover,button.addAlimento:hover{background:#0d6efd;}

/* --- Cards de refeição --- */
.refeicao{background:#f7f9fc;padding:12px;border-radius:15px;margin-top:12px;box-shadow:0 3px 12px rgba(0,0,0,0.08); transition:0.3s;}
.refeicao:hover{box-shadow:0 6px 20px rgba(0,0,0,0.12);}
.item{font-size:14px;margin:4px 0; display:flex; justify-content:space-between;}
.subtotal{font-weight:bold; text-align:right; margin-top:5px;}

/* --- Barras de progresso --- */
.bar-container{background:#ddd;height:16px;border-radius:10px;margin:5px 0;overflow:hidden;}
.bar-fill{height:16px;width:0%;border-radius:10px;transition: width 0.5s;}
.barProteina{background:#1e90ff;}
.barCarbo{background:#ff8c00;}
.barCalorias{background:#32cd32;}
.barAgua{background:#00ced1;}

/* --- Autocomplete --- */
.autocomplete-suggestions{border:1px solid #ccc;background:#fff;position:absolute;z-index:1000;max-height:150px;overflow-y:auto;border-radius:8px;}
.autocomplete-suggestion{padding:6px;cursor:pointer;}
.autocomplete-suggestion:hover{background:#eee;}

/* --- Canvas gráfico --- */
canvas{width:100%;max-width:100%;height:150px;margin-top:15px;}
</style>
</head>
<body>
<div class="container">
<h1>Controle Nutricional Premium</h1>

<!-- --- Abas --- -->
<div class="tabs">
<button id="tabNutri" class="active" onclick="mostrar('nutri')">Nutrição</button>
<button id="tabCorpo" onclick="mostrar('corpo')">Corpo</button>
</div>

<!-- --- Aba Nutrição --- -->
<div id="nutri">
<h3>Metas Diárias</h3>
<label>Proteína (g)</label>
<input type="number" id="metaProteina" value="120">
<label>Carboidrato (g)</label>
<input type="number" id="metaCarbo" value="150">
<label>Calorias (kcal)</label>
<input type="number" id="metaCalorias" value="1600">
<label>Água (ml)</label>
<input type="number" id="metaAgua" value="2000">

<h3>Adicionar Alimento</h3>
<select id="refeicao">
<option value="cafe">☀ Café da Manhã</option>
<option value="almoco">🍛 Almoço</option>
<option value="lanche">☕ Lanche</option>
<option value="jantar">🌙 Jantar</option>
</select>

<input type="text" id="alimento" placeholder="Alimento (ex: frango)">
<div id="sugestoes" class="autocomplete-suggestions"></div>
<input type="number" id="quantidade" placeholder="Quantidade">
<select id="unidade">
<option value="unidade">Unidade</option>
<option value="g">Gramas (g)</option>
<option value="ml">ML</option>
</select>
<button class="add" onclick="adicionar()">Adicionar</button>

<h3>Adicionar Novo Alimento/Whey</h3>
<input type="text" id="novoNome" placeholder="Nome do alimento">
<input type="number" id="novoProteina" placeholder="Proteína (g)">
<input type="number" id="novoCalorias" placeholder="Calorias (kcal)">
<input type="number" id="novoCarbo" placeholder="Carboidrato (g)">
<button class="addAlimento" onclick="adicionarNovoAlimento()">Adicionar Alimento</button>

<h3>Totais do Dia</h3>
<div>Proteína: <span id="totalProteina">0</span> g</div>
<div class="bar-container"><div id="barProteina" class="bar-fill barProteina"></div></div>
<div>Carboidrato: <span id="totalCarbo">0</span> g</div>
<div class="bar-container"><div id="barCarbo" class="bar-fill barCarbo"></div></div>
<div>Calorias: <span id="totalCalorias">0</span> kcal</div>
<div class="bar-container"><div id="barCalorias" class="bar-fill barCalorias"></div></div>
<div>Água: <span id="totalAgua">0</span> ml</div>
<div class="bar-container"><div id="barAgua" class="bar-fill barAgua"></div></div>

<div id="lista"></div>
</div>

<!-- --- Aba Corpo --- -->
<div id="corpo" style="display:none;">
<h3>Medidas Corporais</h3>
<input type="number" id="peso" placeholder="Peso (kg)">
<input type="number" id="altura" placeholder="Altura (cm)">
<input type="number" id="cintura" placeholder="Cintura (cm)">
<input type="number" id="quadril" placeholder="Quadril (cm)">
<input type="number" id="pescoco" placeholder="Pescoço (cm)">
<button class="add" onclick="salvarCorpo()">Salvar Medidas</button>

<h3>Resultado Atual</h3>
<div id="resultado"></div>

<h3>Histórico Detalhado</h3>
<div id="historico"></div>

<h3>Evolução do Peso e Composição Corporal</h3>
<canvas id="graficoPeso"></canvas>
</div>
</div>

<script>
// --- Alternar abas ---
function mostrar(aba){
  if(aba==="nutri"){
    document.getElementById("nutri").style.display="block";
    document.getElementById("corpo").style.display="none";
    document.getElementById("tabNutri").classList.add("active");
    document.getElementById("tabCorpo").classList.remove("active");
  } else{
    document.getElementById("nutri").style.display="none";
    document.getElementById("corpo").style.display="block";
    document.getElementById("tabNutri").classList.remove("active");
    document.getElementById("tabCorpo").classList.add("active");
  }
}

// --- Banco de alimentos inicial ---
let banco = {
"whey growth":{p:24,c:120,carb:3},
"ovo cozido":{p:6,c:70,carb:0},
"ovo frito":{p:7,c:90,carb:0},
"omelete":{p:6,c:90,carb:1},
"frango peito":{p:31,c:165,carb:0},
"frango desfiado":{p:30,c:160,carb:0},
"frango assado":{p:32,c:170,carb:0},
"frango asa":{p:24,c:130,carb:0},
"frango coxa":{p:23,c:125,carb:0},
"bife":{p:26,c:250,carb:0},
"salmão":{p:20,c:208,carb:0},
"sardinha":{p:22,c:208,carb:0},
"batata cozida":{p:2,c:80,carb:18},
"batata doce":{p:2,c:86,carb:20},
"batata frita":{p:3,c:312,carb:40},
"farinha aveia":{p:13,c:389,carb:66},
"farelo aveia":{p:15,c:390,carb:50},
"cacau 70%":{p:20,c:228,carb:14},
"banana":{p:1,c:89,carb:23},
"maçã":{p:0.5,c:52,carb:14},
"mamão":{p:0.6,c:43,carb:11},
"morango":{p:0.5,c:33,carb:8},
"manga":{p:0.8,c:60,carb:15},
"kiwi":{p:1,c:61,carb:15}
};

let dados = JSON.parse(localStorage.getItem("nutri")) || {cafe:[],almoco:[],lanche:[],jantar:[]};
let historico = JSON.parse(localStorage.getItem("corpo")) || [];

// --- Autocomplete ---
let inputAlimento = document.getElementById("alimento");
let sugestoesDiv = document.getElementById("sugestoes");
inputAlimento.addEventListener("input", function(){
  let val = this.value.toLowerCase();
  sugestoesDiv.innerHTML="";
  if(!val) return;
  for(let key in banco){
    if(key.includes(val)){
      let div = document.createElement("div");
      div.classList.add("autocomplete-suggestion");
      div.innerText=key;
      div.addEventListener("click",()=>{inputAlimento.value=key;sugestoesDiv.innerHTML="";});
      sugestoesDiv.appendChild(div);
    }
  }
});

// --- Adicionar alimento ---
function adicionar(){
let nome=document.getElementById("alimento").value.toLowerCase();
let qtd=Number(document.getElementById("quantidade").value)||1;
let unidade=document.getElementById("unidade").value;
let ref=document.getElementById("refeicao").value;
if(!banco[nome]){alert("Alimento não cadastrado"); return;}
let base=banco[nome];
let mult=(unidade==="g"||unidade==="ml")? qtd/100 : qtd;
let item={nome,p:base.p*mult,c:base.c*mult,carb:base.carb*mult};
dados[ref].push(item);
localStorage.setItem("nutri",JSON.stringify(dados));
atualizar();
}

// --- Adicionar novo alimento/Whey ---
function adicionarNovoAlimento(){
let nome=document.getElementById("novoNome").value.toLowerCase();
let p=Number(document.getElementById("novoProteina").value);
let c=Number(document.getElementById("novoCalorias").value);
let carb=Number(document.getElementById("novoCarbo").value);
if(!nome||!p||!c){alert("Preencha todos os campos do alimento!"); return;}
banco[nome]={p,c,carb};
alert("Alimento adicionado com sucesso!");
document.getElementById("novoNome").value="";
document.getElementById("novoProteina").value="";
document.getElementById("novoCalorias").value="";
document.getElementById("novoCarbo").value="";
}

// --- Atualizar totais ---
function atualizar(){
let totalP=0,totalC=0,totalCarb=0,totalAgua=0;
let html="";
for(let r in dados){
if(dados[r].length>0){
let subtotalP=0,subtotalC=0,subtotalCarb=0;
html+=`<div class='refeicao'><b>${r.toUpperCase()}</b>`;
dados[r].forEach(i=>{
totalP+=i.p; totalC+=i.c; totalCarb+=i.carb;
subtotalP+=i.p; subtotalC+=i.c; subtotalCarb+=i.carb;
html+=`<div class='item'>${i.nome} <span>P:${i.p.toFixed(1)}g C:${i.carb.toFixed(1)}g Kcal:${i.c.toFixed(1)}</span></div>`;
});
html+=`<div class='subtotal'>Subtotal: P:${subtotalP.toFixed(1)}g | C:${subtotalCarb.toFixed(1)}g | Kcal:${subtotalC.toFixed(1)}</div></div>`;
}
}
document.getElementById("lista").innerHTML=html;
let metaP=Number(document.getElementById("metaProteina").value);
let metaC=Number(document.getElementById("metaCalorias").value);
let metaCarb=Number(document.getElementById("metaCarbo").value);
let metaAgua=Number(document.getElementById("metaAgua").value);
document.getElementById("totalProteina").innerText=totalP.toFixed(1);
document.getElementById("totalCarbo").innerText=totalCarb.toFixed(1);
document.getElementById("totalCalorias").innerText=totalC.toFixed(1);
document.getElementById("totalAgua").innerText=totalAgua;
document.getElementById("barProteina").style.width=Math.min(totalP/metaP*100,100)+"%";
document.getElementById("barCalorias").style.width=Math.min(totalC/metaC*100,100)+"%";
document.getElementById("barCarbo").style.width=Math.min(totalCarb/metaCarb*100,100)+"%";
document.getElementById("barAgua").style.width=Math.min(totalAgua/metaAgua*100,100)+"%";
}

// --- Aba Corpo ---
function salvarCorpo(){
let peso=Number(document.getElementById("peso").value);
let altura=Number(document.getElementById("altura").value)/100;
let cintura=Number(document.getElementById("cintura").value);
let quadril=Number(document.getElementById("quadril").value);
let pescoco=Number(document.getElementById("pescoco").value);
if(!peso||!altura||!cintura||!quadril||!pescoco){alert("Preencha todos os campos!"); return;}
let imc=peso/(altura*altura);
let gordura=163.205*Math.log10(cintura+quadril-pescoco)-97.684*Math.log10(altura*100)-78.387;
gordura=Math.min(Math.max(gordura,5),60);
let massaGorda=peso*(gordura/100);
let massaMagra=peso-massaGorda;
let registro={data:new Date().toLocaleDateString(),peso,imc:imc.toFixed(1),gordura:gordura.toFixed(1),massaGorda:massaGorda.toFixed(1),massaMagra:massaMagra.toFixed(1)};
historico.unshift(registro);
localStorage.setItem("corpo",JSON.stringify(historico));
mostrarHistorico();
desenharGrafico();
}

// --- Histórico Corpo ---
function mostrarHistorico(){
let html="";
historico.forEach(h=>{
html+=`<div class='small'>${h.data} - ${h.peso}kg | IMC: ${h.imc} | Gordura: ${h.gordura}% | Massa Gorda: ${h.massaGorda}kg | Massa Magra: ${h.massaMagra}kg</div>`;
});
document.getElementById("historico").innerHTML=html;
}

// --- Gráfico Corpo com cores separadas ---
function desenharGrafico(){
let c=document.getElementById("graficoPeso");
let ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);
if(historico.length===0) return;
let maxPeso=Math.max(...historico.map(h=>h.peso))*1.1;
let w=c.width/historico.length;
historico.forEach((h,i)=>{
let x=i*w;
// Massa Magra - verde
ctx.fillStyle="#32cd32";
ctx.fillRect(x,c.height-(h.massaMagra/maxPeso)*c.height,w-6,(h.massaMagra/maxPeso)*c.height);
// Massa Gorda - vermelho
ctx.fillStyle="#ff6347";
ctx.fillRect(x,c.height-(h.massaGorda/maxPeso)*c.height,w-6,(h.massaGorda/maxPeso)*c.height);
// Gordura - azul claro
ctx.fillStyle="#87cefa";
ctx.fillRect(x,c.height-(h.gordura/100*maxPeso)*c.height,w-6,(h.gordura/100*maxPeso)*c.height);
});
}

atualizar();
mostrarHistorico();
desenharGrafico();
</script>
</body>
</html>
